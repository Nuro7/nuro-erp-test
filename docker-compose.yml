version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: nuro7-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nuro7
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: nuro7-api
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.example
    environment:
      TZ: Asia/Kolkata
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: nuro7-web
    restart: unless-stopped
    depends_on:
      - api
    env_file:
      - .env.example
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: nuro7-nginx
    depends_on:
      - web
      - api
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:

