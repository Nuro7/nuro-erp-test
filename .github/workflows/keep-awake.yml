# Keeps the free-tier Render backend awake so demo users never hit a
# 30-60s cold start. Render sleeps a free service after 15 min idle;
# this pings the public health endpoint every 10 min to prevent that.
name: Keep backend awake

on:
  schedule:
    # Every 10 minutes. GitHub may delay scheduled runs under load, so we
    # stay well under Render's 15-min sleep threshold.
    - cron: "*/10 * * * *"
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health endpoint
        run: |
          echo "Pinging backend to keep it warm..."
          curl -sS --max-time 90 --retry 4 --retry-delay 15 --retry-connrefused \
            https://nuro-erp-test.onrender.com/api/v1/health || true
